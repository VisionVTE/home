<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Studio Login — VisionVT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container" style="padding:6rem 20px; max-width:520px;">
    <h2>Studio Login (Devs & Helpers)</h2>
    <p>This area is restricted to development staff and studio helpers. Enter the studio password to continue.</p>
    <form id="login-form" style="margin-top:1rem; display:flex; flex-direction:column; gap:0.75rem;">
      <label style="font-weight:600">Password</label>
      <input id="password" type="password" placeholder="Studio password" required style="padding:0.8rem; border-radius:6px; border:1px solid rgba(255,255,255,0.06); background:var(--secondary-color); color:var(--text-color);">
      <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.5rem;">
        <button type="submit" class="submit-button">Sign in</button>
        <a href="index.html" class="submit-button" style="background:transparent; border:1px solid rgba(255,255,255,0.06); color:var(--light-text);">Cancel</a>
      </div>
      <div id="login-msg" style="color:var(--highlight-color); font-weight:600; margin-top:0.5rem; display:none;"></div>
    </form>
    <p style="margin-top:1rem; color:var(--light-text); font-size:0.9rem;">Note: This uses a client-side password check for convenience only. For production-grade access control, use a server-side auth solution.</p>
  </main>
  <script src="studio-auth.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const pwd = document.getElementById('password');
    const msg = document.getElementById('login-msg');

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      msg.style.display = 'none';
      const ok = await window.studioAuth.login(pwd.value);
      if (ok) {
        location.href = 'studio-dashboard.html';
      } else {
        msg.textContent = 'Incorrect password';
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
